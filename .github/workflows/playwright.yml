name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: #

jobs:
  api-tests:
    name: "Backend: API Suite"
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run API & Setup Projects
      run: npx playwright test --project=setup --project=api-tests
      env:
        API_URL: ${{ vars.API_URL }}
        API_ADMIN_TOKEN: ${{ secrets.API_ADMIN_TOKEN }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-api
        path: playwright-report/
        retention-days: 30
    
    - name: Archive Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-api
        path: allure-results/
        retention-days: 1

  ui-tests:
    name: "Frontend: UI Suite"
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run UI Projects
      run: npx playwright test --project=ui-chromium --project=ui-firefox --project=ui-webkit
      env:
        BASE_URL: ${{ vars.BASE_URL }}
        ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-ui
        path: playwright-report/
        retention-days: 30
    
    - name: Archive Allure Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-ui
        path: allure-results/
        retention-days: 1

  deploy-to-firebase:
    name: "Deploy Allure to Firebase"
    needs: [api-tests, ui-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download API Results
      uses: actions/download-artifact@v4
      with:
        name: allure-results-api
        path: allure-results-combined
    - name: Download UI Results
      uses: actions/download-artifact@v4
      with:
        name: allure-results-ui
        path: allure-results-combined
    - name: Generate Allure Report
      run: |
        npm install -g allure-commandline
        allure generate allure-results-combined --clean -o allure-report
    - name: Deploy to Firebase
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESTFUL_BOOKER }}
        projectId: playwright-reports-blessybabu
        target: restful-booker-qa
        channelId: live